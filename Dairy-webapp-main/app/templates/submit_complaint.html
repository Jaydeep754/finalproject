{% extends 'base.html' %}
{% load static %}
{% block title %}Submit Complaint{% endblock title %}
{% block main %}
<div class="container my-5">
    <div class="row">
        <div class="col-sm-6 offset-sm-3">
            <div class="card shadow-sm border-0 rounded-4">
                <div class="card-body p-4">
                    <h3 class="fw-bold mb-4" style="color: var(--primary);">Submit Complaint</h3>
                    <p class="text-muted">Order ID: #{{order.id}}</p>
                    <p class="text-muted">Product: {{order.product.title}}</p>
                    <form action="" method="post">
                        {% csrf_token %}
                        <div class="mb-3">
                            <label for="subject" class="form-label fw-bold">Subject</label>
                            <input type="text" name="subject" id="subject" class="form-control rounded-pill px-3"
                                required placeholder="e.g. Quality Issue, Delivery Delay">
                        </div>
                        <div class="mb-3">
                            <label for="message" class="form-label fw-bold">Message</label>
                            <textarea name="message" id="message" rows="5" class="form-control rounded-4 px-3" required
                                placeholder="Describe your issue in detail..."></textarea>
                        </div>
                        <div class="d-grid mt-4">
                            <button type="submit" class="btn btn-primary rounded-pill py-2 fw-bold text-white">Submit
                                Complaint</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock main %}
