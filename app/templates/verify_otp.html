{% extends "base.html" %}
{% load static %}

{% block title %}Verify OTP | Milk & More{% endblock title %}

{% block main %}
<div class="auth-wrapper" data-aos="fade-in">
    <div class="auth-card" data-aos="zoom-in" data-aos-delay="200">
        <div class="text-center mb-5">
            <div class="mb-4 d-inline-block p-4 rounded-circle" style="background: var(--accent) !important;">
                <i class="bi bi-shield-check fs-1" style="color: var(--primary);"></i>
            </div>
            <h2 class="mb-2" style="font-family: 'Outfit'; letter-spacing: -1px;">Verify Verification Code</h2>
            <p class="text-muted small text-uppercase letter-spacing-1">Enter the 6-digit code sent to your email</p>
        </div>

        <form action="" method="post">
            {% csrf_token %}
            <div class="mb-5">
                <label for="otp"
                    class="form-label small fw-bold text-uppercase letter-spacing-1 text-muted mb-2 ps-2">Authentication
                    Code</label>
                <input type="text" id="otp" name="otp" class="form-control py-3 text-center fw-bold fs-4"
                    placeholder="XXXXXX" required autofocus maxlength="6">
            </div>

            <div class="d-grid mb-4">
                <button type="submit" class="btn btn-classic py-3 text-uppercase fw-bold letter-spacing-1">
                    Verify OTP
                </button>
            </div>

            <div class="text-center">
                <p class="text-muted small">Didn't receive code?
                    <a href="{% url 'forgot_password' %}" class="text-decoration-none fw-bold"
                        style="color: var(--primary);">Resend OTP</a>
                </p>
            </div>
        </form>
    </div>
</div>
{% endblock main %}
