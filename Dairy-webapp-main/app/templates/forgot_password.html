{% extends "base.html" %}
{% load static %}

{% block title %}Forgot Password | Milk & More{% endblock title %}

{% block main %}
<div class="auth-wrapper" data-aos="fade-in">
    <div class="auth-card" data-aos="zoom-in" data-aos-delay="200">
        <div class="text-center mb-5">
            <div class="mb-4 d-inline-block p-4 rounded-circle" style="background: var(--accent) !important;">
                <i class="bi bi-key-fill fs-1" style="color: var(--primary);"></i>
            </div>
            <h2 class="mb-2" style="font-family: 'Outfit'; letter-spacing: -1px;">Forgot Password</h2>
            <p class="text-muted small text-uppercase letter-spacing-1">Enter your email to receive an OTP</p>
        </div>

        <form action="" method="post">
            {% csrf_token %}
            <div class="mb-5">
                <label for="email"
                    class="form-label small fw-bold text-uppercase letter-spacing-1 text-muted mb-2 ps-2">Email
                    Address</label>
                <input type="email" id="email" name="email" class="form-control py-3"
                    placeholder="Enter your registered email" required autofocus>
            </div>

            <div class="d-grid mb-4">
                <button type="submit" class="btn btn-classic py-3 text-uppercase fw-bold letter-spacing-1">
                    Send OTP
                </button>
            </div>

            <div class="text-center">
                <p class="text-muted small">Remembered your password?
                    <a href="{% url 'login' %}" class="text-decoration-none fw-bold" style="color: var(--primary);">Sign
                        In</a>
                </p>
            </div>
        </form>
    </div>
</div>
{% endblock main %}
