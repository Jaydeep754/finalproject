{% extends "base.html" %}
{% load static %}

{% block title %}Reset Password | Milk & More{% endblock title %}

{% block main %}
<div class="auth-wrapper" data-aos="fade-in">
    <div class="auth-card" data-aos="zoom-in" data-aos-delay="200">
        <div class="text-center mb-5">
            <div class="mb-4 d-inline-block p-4 rounded-circle" style="background: var(--accent) !important;">
                <i class="bi bi-key-fill fs-1" style="color: var(--primary);"></i>
            </div>
            <h2 class="mb-2" style="font-family: 'Outfit'; letter-spacing: -1px;">Set New Password</h2>
            <p class="text-muted small text-uppercase letter-spacing-1">Secure your account with a strong passphrase</p>
        </div>

        <form action="" method="post">
            {% csrf_token %}
            <div class="mb-4">
                <label for="new_password"
                    class="form-label small fw-bold text-uppercase letter-spacing-1 text-muted mb-2 ps-2">New
                    Password</label>
                <input type="password" id="new_password" name="new_password" class="form-control"
                    placeholder="Enter new password" required autofocus>
            </div>

            <div class="mb-5">
                <label for="confirm_password"
                    class="form-label small fw-bold text-uppercase letter-spacing-1 text-muted mb-2 ps-2">Confirm
                    Password</label>
                <input type="password" id="confirm_password" name="confirm_password" class="form-control"
                    placeholder="Confirm new password" required>
            </div>

            <div class="d-grid mb-4">
                <button type="submit" class="btn btn-classic py-3 text-uppercase fw-bold letter-spacing-1">
                    Reset Password
                </button>
            </div>
        </form>
    </div>
</div>
{% endblock main %}
